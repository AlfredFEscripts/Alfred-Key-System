<!DOCTYPE html>
<html>
<head>
    <title>Alfred Hub - Key System</title>
    <style>
        body { background-color: #1a1a1a; color: white; font-family: sans-serif; text-align: center; padding-top: 50px; }
        .box { background: #2a2a2a; padding: 20px; border-radius: 10px; display: inline-block; width: 300px; border: 2px solid #4CAF50; }
        button { background: #4CAF50; border: none; color: white; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        button:disabled { background: #555; cursor: not-repeat; }
        #keyArea { margin-top: 20px; font-weight: bold; color: #4CAF50; display: none; background: #000; padding: 10px; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="box">
        <h2>Alfred Simple Accessories</h2>
        <p>Complete the task to get the key:</p>
        <button id="taskBtn" onclick="startTask()">Start 10s Timer</button>
        <div id="timer" style="margin-top: 10px;"></div>
        <div id="keyArea">Your Key: <br><br> <span id="keyValue" style="color:white; font-size: 20px;">AIfredFESCRlPTS</span></div>
    </div>

    <script>
        function startTask() {
            let btn = document.getElementById('taskBtn');
            let timerDisp = document.getElementById('timer');
            let timeLeft = 10;
            btn.disabled = true;

            let countdown = setInterval(() => {
                timeLeft--;
                timerDisp.innerText = "Please wait: " + timeLeft + "s";
                if (timeLeft <= 0) {
                    clearInterval(countdown);
                    timerDisp.style.display = 'none';
                    document.getElementById('keyArea').style.display = 'block';
                }
            }, 1000);
        }
    </script>
</body>
</html>
